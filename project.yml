name: PollenCast
options:
  bundleIdPrefix: com.pollencast
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    INFOPLIST_FILE: PollenCast/Info.plist
    GENERATE_INFOPLIST_FILE: false

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: PollenCast/Configuration/Debug.xcconfig
  Release: PollenCast/Configuration/Release.xcconfig

targets:
  PollenCast:
    type: application
    platform: iOS
    sources:
      - path: PollenCast
        excludes:
          - "Configuration/*.xcconfig"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pollencast.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        INFOPLIST_FILE: PollenCast/Info.plist
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    entitlements:
      path: PollenCast/PollenCast.entitlements
      properties:
        com.apple.developer.weatherkit: true

  PollenCastTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PollenCastTests
    dependencies:
      - target: PollenCast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pollencast.app.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true

  PollenCastUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PollenCastUITests
    dependencies:
      - target: PollenCast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pollencast.app.uitests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
