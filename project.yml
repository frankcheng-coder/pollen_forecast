name: PollenCast
options:
  bundleIdPrefix: com.pollencast
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: PollenCast/Configuration/Debug.xcconfig
  Release: PollenCast/Configuration/Release.xcconfig

targets:
  PollenCast:
    type: application
    platform: iOS
    sources:
      - path: PollenCast
        excludes:
          - "Configuration/*.xcconfig"
          - "Info.plist"
    info:
      path: PollenCast/Info.plist
      properties:
        CFBundleDisplayName: PollenCast
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleName: $(PRODUCT_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "PollenCast uses your location to show real-time pollen levels and weather for your area."
        GOOGLE_POLLEN_API_KEY: $(GOOGLE_POLLEN_API_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pollencast.app
        PRODUCT_NAME: PollenCast
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: PollenCast/Info.plist
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    entitlements:
      path: PollenCast/PollenCast.entitlements
      properties:
        com.apple.developer.weatherkit: true

  PollenCastTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PollenCastTests
    dependencies:
      - target: PollenCast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pollencast.app.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true

  PollenCastUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PollenCastUITests
    dependencies:
      - target: PollenCast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pollencast.app.uitests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
